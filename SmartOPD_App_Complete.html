<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart OPD Queue Management System</title>
  <style>
    :root{--bg:#edf4f7;--panel:rgba(255,255,255,.92);--text:#102437;--muted:#607789;--teal:#0f9c8d;--blue:#2563eb;--amber:#d97706;--rose:#dc4a61;--indigo:#4f46e5;--slate:#15344b;--border:rgba(16,36,55,.08);--shadow:0 22px 60px rgba(16,36,55,.12);--radius:24px}
    *{box-sizing:border-box}body{margin:0;font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(15,156,141,.14),transparent 22%),radial-gradient(circle at 88% 18%,rgba(37,99,235,.12),transparent 20%),linear-gradient(180deg,#f8fbfc 0%,var(--bg) 100%)}button,input,select{font:inherit}
    body.accessible{font-size:18px}
    body.accessible .panel-title{font-size:24px}
    body.accessible .btn,body.accessible input,body.accessible select{font-size:16px}
    .app{min-height:100vh;display:grid;grid-template-columns:330px 1fr}.sidebar{padding:26px 22px;background:linear-gradient(180deg,#0e2434 0%,#173c53 100%);color:#eef8ff;display:flex;flex-direction:column;gap:18px}.brand{display:flex;gap:14px;align-items:center}.mark{width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,#44d5c5,#7eb6ff);color:#072330;display:grid;place-items:center;font-size:24px;font-weight:900;box-shadow:0 12px 26px rgba(68,213,197,.2)}
    .eyebrow{margin:0 0 6px;text-transform:uppercase;letter-spacing:.14em;font-size:11px;font-weight:800;opacity:.82}h1,h2,h3,h4,p{margin:0}.sidebar h1,.topbar h2,.title-strong{letter-spacing:-.02em}.subtle{color:var(--muted);line-height:1.6}.sidebar .subtle{color:rgba(238,248,255,.77)}.sidebar-card,.nav-wrap{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.06);border-radius:var(--radius);backdrop-filter:blur(10px)}
    .nav-wrap{padding:10px;display:grid;gap:8px}.nav-btn{border:0;background:transparent;color:#eef8ff;padding:12px 14px;border-radius:16px;text-align:left;font-weight:700;cursor:pointer}.nav-btn.active{background:rgba(255,255,255,.14)}.sidebar-card{padding:16px}.mini-stats,.timeline,.list,.stack,.bars{display:grid;gap:10px}.mini-stat,.status-row,.timeline-item,.kpi,.hint-box,.bar-row,.notif-card{border-radius:18px;padding:14px 16px}
    .mini-stat{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.08)}.mini-stat strong{font-size:18px}.main{padding:26px;display:flex;flex-direction:column;gap:18px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px}.badge{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;background:rgba(15,156,141,.12);color:var(--teal);font-size:13px;font-weight:800}
    .layout{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.card{background:var(--panel);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:var(--radius);padding:20px}.wide{grid-column:span 2}.hero{background:linear-gradient(135deg,rgba(15,156,141,.18),rgba(37,99,235,.08)),var(--panel);display:flex;justify-content:space-between;gap:18px;align-items:center}.hero-box{min-width:165px;padding:18px;border-radius:22px;background:#0f2638;color:#fff;text-align:center}.hero-box strong{display:block;font-size:42px;margin-top:8px;line-height:1}
    .panel-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}.panel-title{font-size:22px;font-weight:800}.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:999px;border:1px solid;font-size:12px;font-weight:800}.teal{color:var(--teal);background:rgba(15,156,141,.08);border-color:rgba(15,156,141,.26)}.amber{color:var(--amber);background:rgba(217,119,6,.09);border-color:rgba(217,119,6,.26)}.rose{color:var(--rose);background:rgba(220,74,97,.08);border-color:rgba(220,74,97,.24)}.blue{color:var(--blue);background:rgba(37,99,235,.08);border-color:rgba(37,99,235,.22)}.indigo{color:var(--indigo);background:rgba(79,70,229,.08);border-color:rgba(79,70,229,.22)}
    .grid2,.grid3,.form-grid,.charts,.density-grid{display:grid;gap:12px}.grid2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid3{grid-template-columns:repeat(3,minmax(0,1fr))}.form-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.charts{grid-template-columns:repeat(2,minmax(0,1fr))}.density-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
    label{display:grid;gap:6px;font-size:13px;color:var(--muted);font-weight:700}input,select{width:100%;padding:12px 14px;border-radius:14px;border:1px solid rgba(16,36,55,.12);background:#fff}.btn-row{display:flex;gap:10px;flex-wrap:wrap}.btn{border:0;border-radius:14px;padding:12px 16px;font-weight:800;cursor:pointer}.btn.primary{background:linear-gradient(135deg,#10b4a2,#4b84ff);color:#fff}.btn.secondary{background:#eaf2f6;color:var(--slate)}.btn.warn{background:#fff4e6;color:#9a5a00}
    .kpi,.timeline-item,.status-row,.hint-box,.bar-row,.notif-card{background:#f7fbfc;border:1px solid var(--border)}.kpi strong{display:block;margin-top:8px;font-size:26px}.kpi small{color:var(--muted)}.timeline-item{display:flex;align-items:center;gap:10px}.dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--blue));flex:0 0 auto}.hint-box{background:#fffaf2;border-color:rgba(217,119,6,.18);color:#8a5a05;line-height:1.5}.status-row,.bar-row{display:flex;justify-content:space-between;gap:12px;align-items:center}
    .queue-table{width:100%;border-collapse:collapse}.queue-table th,.queue-table td{text-align:left;padding:13px 12px;font-size:14px;border-bottom:1px solid rgba(16,36,55,.08)}.queue-table thead{background:#f3f8fb}.mono{font-family:Consolas,"Courier New",monospace;font-weight:800}.footer-note{font-size:13px;color:var(--muted);line-height:1.6}.progress{height:8px;border-radius:999px;background:#e8eef2;overflow:hidden;min-width:120px}.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--blue));border-radius:999px}
    .density-card{border-radius:20px;padding:16px;color:#fff;background:linear-gradient(135deg,#17364f,#255b7d)}.density-card.high{background:linear-gradient(135deg,#7b2233,#dc4a61)}.density-card.mid{background:linear-gradient(135deg,#87520c,#d97706)}.density-card.low{background:linear-gradient(135deg,#116153,#0f9c8d)}.ticker{padding:12px 14px;border-radius:18px;background:#f3f9fc;border:1px solid var(--border);font-size:14px;color:#36536a}.notif-card strong{display:block;margin-bottom:6px}
    .spark{display:flex;align-items:flex-end;gap:8px;height:110px;padding:8px 0}.spark span{flex:1;border-radius:10px 10px 0 0;background:linear-gradient(180deg,#7eb6ff,#10b4a2)}.segmented{display:flex;gap:8px;flex-wrap:wrap}.segmented button{border:1px solid rgba(16,36,55,.08);background:#f2f7fa;color:#35526a;padding:9px 12px;border-radius:12px;font-weight:700;cursor:pointer}.segmented button.active{background:#102437;color:#fff}.action-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.action-tile{padding:16px;border-radius:18px;background:#f7fbfc;border:1px solid var(--border);cursor:pointer;font-weight:700;text-align:left}.action-tile strong{display:block;margin-bottom:6px}.search-box{display:flex;gap:10px;flex-wrap:wrap}.search-box input{flex:1}.toast{position:fixed;right:20px;bottom:20px;max-width:360px;background:#10283a;color:#fff;padding:14px 16px;border-radius:18px;box-shadow:var(--shadow);z-index:20}
    @media (max-width:1024px){.app{grid-template-columns:1fr}.layout,.grid2,.grid3,.form-grid,.density-grid,.charts,.action-grid{grid-template-columns:1fr}.wide{grid-column:span 1}.topbar,.hero{flex-direction:column;align-items:stretch}}
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const state={screen:"patient",selectedDoctorDept:"Cardiology",patientFilter:"all",simulationMode:true,simMinute:0,accessibleMode:false,tokenSearch:"",form:{name:"",age:"",mobile:"",department:"General OPD",priority:"normal",language:"English"},doctors:[{id:"DOC-001",name:"Dr. Meera Nair",department:"General OPD",room:"G-12",avg:8,status:"active",delay:5,done:21},{id:"DOC-002",name:"Dr. Arvind Rao",department:"Cardiology",room:"C-04",avg:10,status:"active",delay:12,done:16},{id:"DOC-003",name:"Dr. Nisha Kulkarni",department:"Pediatrics",room:"P-07",avg:7,status:"break",delay:15,done:11}],patients:[{id:"PAT-001",name:"Suresh Verma",age:67,mobile:"9876543210",language:"Hindi",department:"General OPD",doctorId:"DOC-001",token:101,priority:"elderly",status:"consulting",eta:0,notified:true,arrival:"Arrived",risk:"high"},{id:"PAT-002",name:"Ananya Iyer",age:29,mobile:"9123456780",language:"English",department:"General OPD",doctorId:"DOC-001",token:102,priority:"normal",status:"notified",eta:13,notified:true,arrival:"Leave in 5 min",risk:"medium"},{id:"PAT-003",name:"Farhan Ali",age:40,mobile:"9987012345",language:"Hindi",department:"General OPD",doctorId:"DOC-001",token:103,priority:"normal",status:"waiting",eta:21,notified:false,arrival:"Remote",risk:"medium"},{id:"PAT-004",name:"Mohan Patel",age:72,mobile:"9988776655",language:"Gujarati",department:"Cardiology",doctorId:"DOC-002",token:205,priority:"elderly",status:"consulting",eta:0,notified:true,arrival:"Arrived",risk:"high"},{id:"PAT-005",name:"Riya Sharma",age:4,mobile:"9001100110",language:"Hindi",department:"Cardiology",doctorId:"DOC-002",token:206,priority:"emergency",status:"ready",eta:8,notified:true,arrival:"On the way",risk:"high"},{id:"PAT-006",name:"Imran Khan",age:51,mobile:"7001122334",language:"English",department:"Cardiology",doctorId:"DOC-002",token:207,priority:"normal",status:"waiting",eta:28,notified:false,arrival:"Remote",risk:"medium"},{id:"PAT-007",name:"Baby Tara",age:3,mobile:"9090909090",language:"English",department:"Pediatrics",doctorId:"DOC-003",token:301,priority:"normal",status:"waiting",eta:15,notified:false,arrival:"Remote",risk:"low"}],notifications:[{time:"10:52",channel:"WhatsApp",patient:"Ananya Iyer",status:"Delivered",message:"Please reach OPD in about 20 minutes. Token G-102."},{time:"10:47",channel:"SMS",patient:"Riya Sharma",status:"Delivered",message:"Cardiology queue moving faster. Please arrive now. Token C-206."}],crowd:[{zone:"East Waiting Hall",level:"moderate",count:22},{zone:"Cardiology Lobby",level:"high",count:31},{zone:"Pediatrics Corner",level:"low",count:8}],trackedPatientId:"PAT-002",toast:""};
    const priorityRank={emergency:0,elderly:1,normal:2},labels={priority:{emergency:"Emergency",elderly:"Elderly",normal:"Normal"},status:{consulting:"In Consultation",ready:"Ready",notified:"Notified",waiting:"Waiting"}},sparkData=[44,56,72,60,88,96,82];
    const appEl=()=>document.getElementById("app"),doctorByDept=(dept)=>state.doctors.find((d)=>d.department===dept),doctorById=(id)=>state.doctors.find((d)=>d.id===id),uniqueDepts=()=>[...new Set(state.doctors.map((d)=>d.department))];
    const deptPatients=(dept)=>state.patients.filter((p)=>p.department===dept).sort((a,b)=>(priorityRank[a.priority]-priorityRank[b.priority])||(a.token-b.token));
    const nextToken=(dept)=>{const nums=state.patients.filter((p)=>p.department===dept).map((p)=>p.token);return(nums.length?Math.max(...nums):(dept==="General OPD"?100:dept==="Cardiology"?200:300))+1};
    const notifyLead=(wait)=>wait>=45?30:wait>=25?25:20;
    const tokenLabel=(patient)=>`${patient.department==="General OPD"?"G":patient.department==="Cardiology"?"C":"P"}-${patient.token}`;
    const channelFor=(patient)=>patient.mobile.startsWith("9")?"WhatsApp":"SMS";
    const escapeHtml=(text)=>String(text||"").replace(/[&<>"']/g,(m)=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
    const trackedPatient=()=>state.patients.find((p)=>p.id===state.trackedPatientId)||state.patients[0];
    const densityClass=(level)=>level==="high"?"high":level==="moderate"?"mid":"low";
    const fmtClock=()=>new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});
    function recalcDepartment(dept){const doctor=doctorByDept(dept),list=deptPatients(dept);let rolling=doctor.delay;let hasConsulting=list.some((p)=>p.status==="consulting");list.forEach((patient,index)=>{if(patient.status==="consulting"){patient.eta=0;patient.notified=true;patient.arrival="Arrived";return}if(!hasConsulting&&index===0){patient.status="ready";patient.eta=0;patient.notified=true;patient.arrival="Proceed now";hasConsulting=true;return}patient.eta=rolling;patient.status=rolling<=10?"ready":rolling<=30?"notified":"waiting";patient.notified=patient.status!=="waiting";patient.arrival=rolling<=10?"Proceed now":rolling<=25?"Leave in 5 min":"Remote";rolling+=doctor.avg})}
    function recalcAll(){uniqueDepts().forEach(recalcDepartment)}
    function addNotification(patient,message){state.notifications.unshift({time:fmtClock(),channel:channelFor(patient),patient:patient.name,status:"Delivered",message});state.notifications=state.notifications.slice(0,14)}
    function queueSummary(){const activeWaiting=state.patients.filter((p)=>p.status!=="consulting").length;const avgWait=Math.round(state.patients.reduce((sum,p)=>sum+p.eta,0)/state.patients.length);const activeDoctors=state.doctors.filter((d)=>d.status==="active").length;const highDensity=activeWaiting>10?"High":activeWaiting>6?"Moderate":"Low";const onSite=state.patients.filter((p)=>p.arrival==="Arrived"||p.arrival==="Proceed now").length;return{activeWaiting,avgWait,activeDoctors,highDensity,onSite}}
    function patientQueueFiltered(){if(state.patientFilter==="all")return state.patients;return state.patients.filter((p)=>p.department===state.patientFilter)}
    function showToast(message){state.toast=message;render();clearTimeout(window.toastTimer);window.toastTimer=setTimeout(()=>{state.toast="";render()},2800)}
    function setScreen(screen){state.screen=screen;render()} function setDoctorDept(dept){state.selectedDoctorDept=dept;render()} function setPatientFilter(filter){state.patientFilter=filter;render()} function toggleSimulation(){state.simulationMode=!state.simulationMode;showToast(state.simulationMode?"Live simulation resumed.":"Live simulation paused.")} function updateForm(field,value){state.form[field]=value} function updateTracked(id){state.trackedPatientId=id;render()} function toggleAccessibleMode(){state.accessibleMode=!state.accessibleMode;document.body.classList.toggle("accessible",state.accessibleMode);showToast(state.accessibleMode?"Accessibility mode enabled.":"Accessibility mode disabled.")} function updateTokenSearch(value){state.tokenSearch=value}
    function findTrackedBySearch(){const q=state.tokenSearch.trim().toLowerCase();if(!q){showToast("Enter token, patient name, or mobile digits.");return}const digits=q.replace(/\D/g,"");const found=state.patients.find((p)=>tokenLabel(p).toLowerCase()===q||p.name.toLowerCase().includes(q)||(digits.length>=4&&p.mobile.includes(digits)));if(!found){showToast("No matching active token found.");return}state.trackedPatientId=found.id;state.patientFilter=found.department;showToast(`Tracking ${tokenLabel(found)} for ${found.name}.`);render()}
    function patientAction(kind){const patient=trackedPatient();if(kind==="arrive"){patient.arrival="Arrived";addNotification(patient,`${tokenLabel(patient)} marked as arrived at hospital.`);showToast("Patient marked as arrived.")}if(kind==="assist"){addNotification(patient,`Assistance requested for ${tokenLabel(patient)}. Front desk and support staff notified.`);showToast("Support desk notified for wheelchair or escort assistance.")}if(kind==="share"){addNotification(patient,`Status shared with attendant for ${tokenLabel(patient)}. Live queue link sent.`);showToast("Queue status shared with family or attendant.")}render()}
    function registerPatient(){const{name,age,mobile,department,priority,language}=state.form;if(!name.trim()||!mobile.trim()){showToast("Please enter patient name and mobile number.");return}const doctor=doctorByDept(department);const patient={id:"PAT-"+String(Date.now()).slice(-5),name:name.trim(),age:Number(age)||0,mobile:mobile.trim(),language,department,doctorId:doctor.id,token:nextToken(department),priority,status:"waiting",eta:0,notified:false,arrival:"Remote",risk:priority==="elderly"||priority==="emergency"?"high":"medium"};state.patients.push(patient);recalcDepartment(department);state.trackedPatientId=patient.id;addNotification(patient,`Token ${tokenLabel(patient)} created. ${channelFor(patient)} alert will be sent about ${notifyLead(patient.eta)} minutes before consultation.`);state.form={name:"",age:"",mobile:"",department:"General OPD",priority:"normal",language:"English"};showToast("Patient registered, token created, and smart notification plan scheduled.")}
    function completeConsultation(){const doctor=doctorByDept(state.selectedDoctorDept);const current=state.patients.find((p)=>p.department===doctor.department&&p.status==="consulting");if(!current){showToast("No current consultation to complete.");return}state.patients=state.patients.filter((p)=>p.id!==current.id);doctor.done+=1;recalcDepartment(doctor.department);showToast("Consultation completed and queue recalculated.")}
    function callNext(){const dept=state.selectedDoctorDept;const current=state.patients.find((p)=>p.department===dept&&p.status==="consulting");if(current){showToast("A patient is already in consultation.");return}const next=deptPatients(dept)[0];if(!next){showToast("No patient available in this queue.");return}next.status="consulting";next.eta=0;next.arrival="Arrived";addNotification(next,`Please proceed now. ${tokenLabel(next)} is being called in.`);recalcDepartment(dept);showToast("Next patient moved into consultation.")}
    function addDelay(minutes){const doctor=doctorByDept(state.selectedDoctorDept);doctor.delay+=minutes;recalcDepartment(doctor.department);deptPatients(doctor.department).forEach((patient)=>{if(patient.status!=="consulting"){addNotification(patient,`Updated ETA for ${tokenLabel(patient)}. Doctor delay changed queue timing. Please check revised arrival advice.`)}});showToast("Doctor delay updated and notifications rescheduled.")}
    function insertEmergency(){const dept=state.selectedDoctorDept,doctor=doctorByDept(dept);const patient={id:"PAT-"+String(Date.now()).slice(-5),name:"Emergency Walk-in",age:58,mobile:"9898989898",language:"English",department:dept,doctorId:doctor.id,token:nextToken(dept),priority:"emergency",status:"ready",eta:5,notified:true,arrival:"Proceed now",risk:"high"};state.patients.push(patient);recalcDepartment(dept);addNotification(patient,`Emergency priority added to ${dept}. ${tokenLabel(patient)} has been inserted near the front of the queue.`);showToast("Emergency case inserted and downstream queue rescheduled.")}
    function tickSimulation(){if(!state.simulationMode)return;state.simMinute+=1;state.doctors.forEach((doctor)=>{if(doctor.delay>0&&state.simMinute%3===0)doctor.delay-=1});state.patients.forEach((patient)=>{if(patient.status!=="consulting"&&patient.eta>0)patient.eta=Math.max(0,patient.eta-1)});recalcAll();render()}
    function navButton(id,label){return `<button class="nav-btn ${state.screen===id?"active":""}" onclick="setScreen('${id}')">${label}</button>`}
    function statusPill(status){const cls=status==="consulting"?"teal":status==="waiting"?"blue":"amber";return `<span class="pill ${cls}">${labels.status[status]}</span>`}
    function renderPatient(){const patient=trackedPatient(),doctor=doctorById(patient.doctorId);return `
      <div class="card hero wide"><div><p class="eyebrow">Patient Interface</p><h3 class="title-strong">Smarter arrival, less infection exposure</h3><p class="subtle">This view gives patients multilingual registration, digital tokens, live queue tracking, estimated waiting time, and revised arrival guidance if a doctor is delayed.</p></div><div class="hero-box"><div>Tracked Token</div><strong>${tokenLabel(patient)}</strong></div></div>
      <div class="card"><div class="panel-head"><div><div class="eyebrow">Registration</div><div class="panel-title">Patient registration and notification setup</div></div><span class="pill teal">Digital Token Enabled</span></div><div class="form-grid"><label>Patient Name<input value="${escapeHtml(state.form.name)}" oninput="updateForm('name', this.value)" placeholder="Enter full name"></label><label>Mobile Number<input value="${escapeHtml(state.form.mobile)}" oninput="updateForm('mobile', this.value)" placeholder="+91 XXXXXXXXXX"></label><label>Age<input value="${escapeHtml(state.form.age)}" oninput="updateForm('age', this.value)" placeholder="Enter age"></label><label>Preferred Language<select onchange="updateForm('language', this.value)">${["English","Hindi","Gujarati","Tamil"].map((lang)=>`<option ${state.form.language===lang?"selected":""}>${lang}</option>`).join("")}</select></label><label>Department<select onchange="updateForm('department', this.value)">${uniqueDepts().map((dept)=>`<option ${state.form.department===dept?"selected":""}>${dept}</option>`).join("")}</select></label><label>Priority<select onchange="updateForm('priority', this.value)">${["normal","elderly","emergency"].map((p)=>`<option value="${p}" ${state.form.priority===p?"selected":""}>${labels.priority[p]}</option>`).join("")}</select></label></div><div class="btn-row" style="margin-top:14px"><button class="btn primary" onclick="registerPatient()">Generate Token</button><button class="btn secondary" onclick="setPatientFilter('all')">Reset Queue Filter</button><button class="btn secondary" onclick="toggleAccessibleMode()">${state.accessibleMode?"Disable":"Enable"} Accessibility Mode</button></div></div>
      <div class="card"><div class="panel-head"><div><div class="eyebrow">Token Status</div><div class="panel-title">Realtime waiting-time prediction</div></div>${statusPill(patient.status)}</div><div class="grid2"><div class="kpi"><div>Patient</div><strong>${patient.name}</strong><small>${patient.language} communication</small></div><div class="kpi"><div>Doctor</div><strong>${doctor.name}</strong><small>${doctor.department} • Room ${doctor.room}</small></div><div class="kpi"><div>Estimated Wait</div><strong>${patient.eta} min</strong><small>AI-adjusted using live queue</small></div><div class="kpi"><div>Arrival Advice</div><strong>${patient.arrival}</strong><small>${notifyLead(patient.eta)} min lead-time rule</small></div></div><div class="hint-box" style="margin-top:14px">If the doctor is delayed or an emergency patient is inserted, the system automatically recalculates ETA and resends updated arrival guidance through SMS or WhatsApp.</div></div>
      <div class="card"><div class="panel-head"><div><div class="eyebrow">Quick Help</div><div class="panel-title">Simple patient-friendly actions</div></div><span class="pill blue">One-tap support</span></div><div class="action-grid"><button class="action-tile" onclick="patientAction('arrive')"><strong>I'm At Hospital</strong><span class="footer-note">Updates staff and queue readiness</span></button><button class="action-tile" onclick="patientAction('assist')"><strong>Need Assistance</strong><span class="footer-note">Wheelchair or escort help request</span></button><button class="action-tile" onclick="patientAction('share')"><strong>Share With Attendant</strong><span class="footer-note">Sends live status to family member</span></button></div></div>
      <div class="card"><div class="panel-head"><div><div class="eyebrow">Quick Search</div><div class="panel-title">Find token by name, mobile, or token number</div></div><span class="pill indigo">Fast Lookup</span></div><div class="search-box"><input value="${escapeHtml(state.tokenSearch)}" oninput="updateTokenSearch(this.value)" placeholder="Example: G-102, Ananya, 43210"><button class="btn primary" onclick="findTrackedBySearch()">Find Token</button></div><div class="footer-note" style="margin-top:10px">Helpful for reception desks, attendants, and elderly patients who may not remember the exact token.</div></div>
      <div class="card wide"><div class="panel-head"><div><div class="eyebrow">Live Queue</div><div class="panel-title">Filter and track active patients</div></div><div class="segmented"><button class="${state.patientFilter==="all"?"active":""}" onclick="setPatientFilter('all')">All</button>${uniqueDepts().map((dept)=>`<button class="${state.patientFilter===dept?"active":""}" onclick="setPatientFilter('${dept}')">${dept}</button>`).join("")}</div></div><table class="queue-table"><thead><tr><th>Token</th><th>Patient</th><th>Priority</th><th>Status</th><th>ETA</th><th>Arrival</th><th>Track</th></tr></thead><tbody>${patientQueueFiltered().map((p)=>`<tr><td class="mono">${tokenLabel(p)}</td><td>${p.name}<div class="footer-note">${p.department} • ${p.language}</div></td><td>${labels.priority[p.priority]}</td><td>${labels.status[p.status]}</td><td>${p.eta} min</td><td>${p.arrival}</td><td><button class="btn secondary" onclick="updateTracked('${p.id}')">Track</button></td></tr>`).join("")}</tbody></table></div>`}
    function renderDoctor(){const doctor=doctorByDept(state.selectedDoctorDept),queue=deptPatients(doctor.department),current=queue.find((p)=>p.status==="consulting"),next=queue.find((p)=>p.status!=="consulting");return `
      <div class="card hero wide"><div><p class="eyebrow">Doctor Dashboard</p><h3 class="title-strong">${doctor.name}</h3><p class="subtle">${doctor.department} • Room ${doctor.room}. Doctors can control the consultation flow, insert emergency cases, and trigger dynamic patient rescheduling.</p></div><div class="hero-box"><div>Status</div><strong>${doctor.status.toUpperCase()}</strong></div></div>
      <div class="card wide"><div class="panel-head"><div><div class="eyebrow">Doctor Selection</div><div class="panel-title">Switch operating department</div></div><div class="segmented">${uniqueDepts().map((dept)=>`<button class="${state.selectedDoctorDept===dept?"active":""}" onclick="setDoctorDept('${dept}')">${dept}</button>`).join("")}</div></div><div class="grid3"><div class="kpi"><div>Completed Today</div><strong>${doctor.done}</strong><small>consultations</small></div><div class="kpi"><div>Average Consult Time</div><strong>${doctor.avg} min</strong><small>model baseline</small></div><div class="kpi"><div>Doctor Delay</div><strong>${doctor.delay} min</strong><small>dynamic rescheduling active</small></div></div><div class="btn-row" style="margin-top:16px"><button class="btn primary" onclick="completeConsultation()">Complete Consultation</button><button class="btn secondary" onclick="callNext()">Call Next</button><button class="btn warn" onclick="addDelay(10)">Delay +10 min</button><button class="btn secondary" onclick="insertEmergency()">Insert Emergency</button></div></div>
      <div class="card"><div class="panel-head"><div><div class="eyebrow">Current Room State</div><div class="panel-title">Consultation summary</div></div><span class="pill teal">Smart Queue Running</span></div><div class="stack"><div class="status-row"><span>Current patient</span><strong>${current?current.name:"No active consultation"}</strong></div><div class="status-row"><span>Next likely entry</span><strong>${next?tokenLabel(next)+" • "+next.name:"Queue clear"}</strong></div><div class="status-row"><span>Predicted readiness</span><strong>${next?next.arrival:"N/A"}</strong></div></div></div>
      <div class="card"><div class="panel-head"><div><div class="eyebrow">Clinical Priority</div><div class="panel-title">Risk-aware queue balance</div></div></div><div class="timeline"><div class="timeline-item"><span class="dot"></span>Emergency patients jump to the front when safe</div><div class="timeline-item"><span class="dot"></span>Elderly patients receive reduced on-site wait exposure</div><div class="timeline-item"><span class="dot"></span>Normal patients preserve fairness by token sequence</div><div class="timeline-item"><span class="dot"></span>All downstream ETAs are refreshed instantly after delays</div></div></div>
      <div class="card wide"><div class="panel-head"><div><div class="eyebrow">Queue Table</div><div class="panel-title">Priority-aware live queue</div></div><span class="pill indigo">Notification Rescheduler Active</span></div><table class="queue-table"><thead><tr><th>Token</th><th>Patient</th><th>Priority</th><th>Status</th><th>ETA</th><th>Notification</th><th>Arrival</th></tr></thead><tbody>${queue.map((p)=>`<tr><td class="mono">${tokenLabel(p)}</td><td>${p.name}<div class="footer-note">Age ${p.age} • ${p.language}</div></td><td>${labels.priority[p.priority]}</td><td>${labels.status[p.status]}</td><td>${p.eta} min</td><td>${p.notified?"Sent":"Pending"}</td><td>${p.arrival}</td></tr>`).join("")}</tbody></table></div>`}
    function renderAdmin(){const summary=queueSummary();return `
      <div class="card hero wide"><div><p class="eyebrow">Hospital Admin Panel</p><h3 class="title-strong">Operations, crowding, and analytics</h3><p class="subtle">Admins get a live control tower for patient flow, doctor availability, notification success, predictive demand, and crowd density risk.</p></div><div class="hero-box"><div>Crowd Risk</div><strong>${summary.highDensity}</strong></div></div>
      <div class="card wide"><div class="grid3"><div class="kpi"><div>Active Waiting Tokens</div><strong>${summary.activeWaiting}</strong><small>patients still off-site or in queue</small></div><div class="kpi"><div>Average Wait</div><strong>${summary.avgWait} min</strong><small>recalculated from live state</small></div><div class="kpi"><div>Patients On-site</div><strong>${summary.onSite}</strong><small>crowd exposure reduced by remote waiting</small></div></div></div>
      <div class="card wide"><div class="panel-head"><div><div class="eyebrow">Live Command Center</div><div class="panel-title">Department queue health and next notifications</div></div><div class="btn-row"><button class="btn ${state.simulationMode?"primary":"secondary"}" onclick="toggleSimulation()">${state.simulationMode?"Pause Simulation":"Resume Simulation"}</button></div></div><div class="ticker">Simulation minute ${state.simMinute}. The system reduces doctor delays over time, refreshes ETAs, and demonstrates real-time queue movement for a hospital demo.</div><table class="queue-table" style="margin-top:12px"><thead><tr><th>Department</th><th>Doctor</th><th>Status</th><th>Delay</th><th>Queue Size</th><th>Next Alert</th></tr></thead><tbody>${state.doctors.map((doctor)=>{const queue=deptPatients(doctor.department),next=queue.find((p)=>p.status!=="consulting");return `<tr><td>${doctor.department}</td><td>${doctor.name}</td><td>${doctor.status}</td><td>${doctor.delay} min</td><td>${queue.length}</td><td>${next?tokenLabel(next)+" in "+Math.max(0,next.eta-notifyLead(next.eta))+" min":"None"}</td></tr>`}).join("")}</tbody></table></div>
      <div class="card wide"><div class="panel-head"><div><div class="eyebrow">Crowd Density</div><div class="panel-title">Waiting-area heat view</div></div><span class="pill rose">Infection-control Lens</span></div><div class="density-grid">${state.crowd.map((zone)=>`<div class="density-card ${densityClass(zone.level)}"><div class="eyebrow">${zone.zone}</div><h3>${zone.count} people</h3><p style="margin-top:6px;opacity:.88">${zone.level.toUpperCase()} density</p></div>`).join("")}</div></div>
      <div class="card"><div class="panel-head"><div><div class="eyebrow">Predictive Analytics</div><div class="panel-title">OPD load trend</div></div></div><div class="spark">${sparkData.map((v)=>`<span style="height:${v}%"></span>`).join("")}</div><div class="footer-note">Load is expected to peak in late morning. Cardiology remains the highest-risk department for spillover crowding today.</div></div>
      <div class="card"><div class="panel-head"><div><div class="eyebrow">Notification Center</div><div class="panel-title">Recent delivery events</div></div></div><div class="list">${state.notifications.slice(0,5).map((n)=>`<div class="notif-card"><strong>${n.patient}</strong><div class="footer-note">${n.channel} • ${n.time} • ${n.status}</div><div style="margin-top:8px;line-height:1.5">${n.message}</div></div>`).join("")}</div></div>`}
    function renderSystem(){return `
      <div class="card hero wide"><div><p class="eyebrow">Architecture And AI</p><h3 class="title-strong">Scalable full-stack design for Indian hospitals</h3><p class="subtle">This project combines a patient-friendly frontend, operational backend, queue intelligence, notification workflows, and predictive analytics in one infection-aware OPD platform.</p></div><div class="hero-box"><div>Alert Window</div><strong>20-30m</strong></div></div>
      <div class="card wide"><div class="panel-head"><div><div class="eyebrow">Architecture Layers</div><div class="panel-title">System blueprint</div></div><span class="pill teal">Frontend + Backend + AI + APIs</span></div><div class="timeline"><div class="timeline-item"><span class="dot"></span>Frontend: React dashboards for patients, doctors, and administrators</div><div class="timeline-item"><span class="dot"></span>Backend: Flask or Node.js APIs for registration, queueing, doctor events, and notifications</div><div class="timeline-item"><span class="dot"></span>Database: MySQL stores patients, doctors, appointments, queue tokens, and notifications</div><div class="timeline-item"><span class="dot"></span>Notification gateway: SMS and WhatsApp APIs trigger just-in-time arrival messages</div><div class="timeline-item"><span class="dot"></span>AI model: Python predicts consultation time, waiting duration, and best notification lead time</div></div></div>
      <div class="charts wide"><div class="card"><div class="panel-head"><div><div class="eyebrow">Database Schema</div><div class="panel-title">Core entities</div></div></div><div class="bars">${[["Patients",92],["Doctors",68],["Appointments",84],["Queue Tokens",88],["Notifications",74]].map(([label,value])=>`<div class="bar-row"><span>${label}</span><div class="progress"><span style="width:${value}%"></span></div></div>`).join("")}</div></div><div class="card"><div class="panel-head"><div><div class="eyebrow">AI Inputs</div><div class="panel-title">Prediction features</div></div></div><div class="timeline"><div class="timeline-item"><span class="dot"></span>Doctor average consultation time</div><div class="timeline-item"><span class="dot"></span>Patient age band and priority category</div><div class="timeline-item"><span class="dot"></span>Current queue length and delay minutes</div><div class="timeline-item"><span class="dot"></span>Department, hour of day, and no-show pattern</div></div></div></div>
      <div class="card wide"><div class="panel-head"><div><div class="eyebrow">Algorithm Logic</div><div class="panel-title">Queue management and notification scheduling</div></div></div><div class="grid2"><div class="hint-box">Queue management: sort by emergency, elderly, and normal classes; preserve fairness inside each class using token order.</div><div class="hint-box">Priority handling: emergency cases can be inserted near the front while elderly patients are kept away from long on-site waits.</div><div class="hint-box">Real-time updates: registration, completion, break, and doctor delay events trigger ETA recalculation for all downstream tokens.</div><div class="hint-box">Notification scheduling: send time is based on expected consultation start minus a dynamic 20-30 minute lead window.</div></div></div>`}
    function render(){recalcAll();const summary=queueSummary();document.body.classList.toggle("accessible",state.accessibleMode);let content="";if(state.screen==="patient")content=renderPatient();if(state.screen==="doctor")content=renderDoctor();if(state.screen==="admin")content=renderAdmin();if(state.screen==="system")content=renderSystem();appEl().innerHTML=`<div class="app"><aside class="sidebar"><div class="brand"><div class="mark">+</div><div><p class="eyebrow">Hospital Technology Suite</p><h1>Smart OPD</h1></div></div><div class="subtle">A queue management platform designed to reduce crowding, shorten waiting exposure, and lower nosocomial infection risk in OPD areas.</div><div class="nav-wrap">${navButton("patient","Patient Interface")}${navButton("doctor","Doctor Dashboard")}${navButton("admin","Hospital Admin Panel")}${navButton("system","Architecture And AI")}</div><div class="sidebar-card"><div class="eyebrow">Live Snapshot</div><div class="mini-stats"><div class="mini-stat"><span>Active Waiting</span><strong>${summary.activeWaiting}</strong></div><div class="mini-stat"><span>Average Wait</span><strong>${summary.avgWait}m</strong></div><div class="mini-stat"><span>On-site Patients</span><strong>${summary.onSite}</strong></div><div class="mini-stat"><span>Crowd Density</span><strong>${summary.highDensity}</strong></div></div></div><div class="sidebar-card"><div class="eyebrow">Workflow</div><div class="subtle">Register patient, generate token, predict wait, send alert by WhatsApp or SMS, then bring the patient to hospital only when needed.</div></div></aside><main class="main"><div class="topbar"><div><p class="eyebrow">Smart Queue Management</p><h2>Reduce OPD overcrowding with predictive arrival alerts</h2></div><div class="badge">India-ready • SMS + WhatsApp • AI ETA • Crowd Analytics</div></div><section class="layout">${content}</section><div class="footer-note">This enhanced browser demo simulates the patient journey, doctor operations, admin monitoring, predictive scheduling, crowd density, and dynamic notification rescheduling without needing backend runtimes on this machine.</div></main></div>${state.toast?`<div class="toast">${escapeHtml(state.toast)}</div>`:""}`}
    window.setScreen=setScreen;window.setDoctorDept=setDoctorDept;window.setPatientFilter=setPatientFilter;window.toggleSimulation=toggleSimulation;window.updateForm=updateForm;window.updateTracked=updateTracked;window.registerPatient=registerPatient;window.completeConsultation=completeConsultation;window.callNext=callNext;window.addDelay=addDelay;window.insertEmergency=insertEmergency;window.toggleAccessibleMode=toggleAccessibleMode;window.updateTokenSearch=updateTokenSearch;window.findTrackedBySearch=findTrackedBySearch;window.patientAction=patientAction;recalcAll();render();setInterval(tickSimulation,4000);
  </script>
</body>
</html>
